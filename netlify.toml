[build]
  publish = "frontend"
  functions = "backend"
  command = "echo 'Build not required'"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  PYTHON_VERSION = "3.9"
